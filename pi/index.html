<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Google Tasks Configuration</title>
    <link rel="stylesheet" href="sdpi.css">
    <style>
        .sdpi-wrapper { background-color: #2d2d2d; color: white; font-family: sans-serif; padding: 10px; }
        .sdpi-item { display: flex; align-items: center; margin-bottom: 10px; }
        .sdpi-item-label { width: 40%; font-size: 11px; }
        .sdpi-item-value { width: 60%; background: #3d3d3d; border: 1px solid #555; color: white; padding: 4px; }
        input[type="checkbox"] { width: auto; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="sdpi-wrapper">
        <div class="sdpi-item">
            <div class="sdpi-item-label">Lista de Tareas</div>
            <select class="sdpi-item-value" id="listId" onchange="sendSettings()">
                <option value="">Cargando listas...</option>
            </select>
        </div>
        <div class="sdpi-item">
            <div class="sdpi-item-label">Índice Tarea</div>
            <input class="sdpi-item-value" type="number" id="taskIndex" value="1" min="1" onchange="sendSettings()">
        </div>
        <div class="sdpi-item">
            <input type="checkbox" id="onlyOpenTasks" onchange="sendSettings()" checked>
            <label for="onlyOpenTasks" style="font-size: 11px;">Solo tareas abiertas</label>
        </div>
        <div class="sdpi-item">
            <div class="sdpi-item-label">Fuente</div>
            <input class="sdpi-item-value" type="text" id="fontFamily" value="Verdana" onchange="sendSettings()">
        </div>
        <div class="sdpi-item">
            <div class="sdpi-item-label">Tamaño Fuente</div>
            <input class="sdpi-item-value" type="number" id="fontSize" value="12" min="6" onchange="sendSettings()">
        </div>
        <div class="sdpi-item">
            <div class="sdpi-item-label">Max Caracteres/Línea</div>
            <input class="sdpi-item-value" type="number" id="maxCharsPerLine" value="10" min="1" onchange="sendSettings()">
        </div>
    </div>

    <script>
        let websocket = null;
        let uuid = null;
        let actionInfo = null;
        let settings = {};

        function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
            uuid = inUUID;
            actionInfo = JSON.parse(inActionInfo);
            settings = actionInfo.payload.settings;

            // Cargar settings actuales en la UI
            if (settings.listId) document.getElementById('listId').value = settings.listId;
            if (settings.taskIndex) document.getElementById('taskIndex').value = settings.taskIndex;
            if (settings.onlyOpenTasks !== undefined) document.getElementById('onlyOpenTasks').checked = (settings.onlyOpenTasks === 'true' || settings.onlyOpenTasks === true);
            if (settings.fontFamily) document.getElementById('fontFamily').value = settings.fontFamily;
            if (settings.fontSize) document.getElementById('fontSize').value = settings.fontSize;
            if (settings.maxCharsPerLine) document.getElementById('maxCharsPerLine').value = settings.maxCharsPerLine;

            websocket = new WebSocket('ws://127.0.0.1:' + inPort);
            websocket.onopen = function () {
                var json = { event: inRegisterEvent, uuid: inUUID };
                websocket.send(JSON.stringify(json));
            };

            websocket.onmessage = function (evt) {
                const jsonObj = JSON.parse(evt.data);
                if (jsonObj.event === 'sendToPropertyInspector') {
                    const payload = jsonObj.payload;
                    if (payload.lists) {
                        const select = document.getElementById('listId');
                        const currentVal = settings.listId || select.value;
                        select.innerHTML = '';
                        payload.lists.forEach(list => {
                            const option = document.createElement('option');
                            option.value = list.id;
                            option.text = list.title;
                            if (list.id === currentVal) option.selected = true;
                            select.appendChild(option);
                        });
                    }
                }
            };
        }

        function sendSettings() {
            if (websocket && websocket.readyState === 1) {
                settings = {
                    listId: document.getElementById('listId').value,
                    taskIndex: document.getElementById('taskIndex').value,
                    onlyOpenTasks: document.getElementById('onlyOpenTasks').checked,
                    fontFamily: document.getElementById('fontFamily').value,
                    fontSize: document.getElementById('fontSize').value,
                    maxCharsPerLine: document.getElementById('maxCharsPerLine').value
                };
                const json = {
                    event: 'setSettings',
                    context: uuid,
                    payload: settings
                };
                websocket.send(JSON.stringify(json));
            }
        }
    </script>
</body>
</html>
